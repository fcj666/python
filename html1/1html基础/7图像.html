<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<!--    img标签常用的属性-->
<!--    属性-->
<!--    src    图像的文件地址-->
<!--    alt    图片显示不出来时的提示文字-->
<!--    title  鼠标移到图片上的提示文字-->


<!--
    src 即source(源文件) img标签的src属性用于指定图像源文件所在的路径 他是图像不可缺少的属性
    alt 属性用于设置图片的描述信息 这些信息是给搜索引擎看的，在搜索引擎优化seo中 alt属性也是一个非常重要的属性
    title属性 title属性用于设置鼠标移到图片上的提示文字，这些提示文字是给用户看的

-->


<!--


    内部连接的链接对象实在同一个网站的



-->

    <div>
        <a href="#music">推荐音乐</a>
        <a href="#movie">
            推荐电影
        </a>

        <a href="article">推荐文章</a>

    </div>


    <div id="music">
        <h3>推荐音乐</h3>
        <ul>
            <li>林俊杰-北风吹过的下图</li>
            <li>曲婉婷在我的歌声里</li>
            <li>许嵩 灰色头像</li>
        </ul>

    </div>


    <div id="movie">
        <h3>推荐电影</h3>
        <ul>
            <li>蜘蛛侠系列</li>
            <li>钢铁侠系统</li>
            <li>复仇者联盟</li>
        </ul>
    </div>

    <div id="article">
        <h3>推荐文章</h3>
        <ul>
            <li>朱自清 -荷塘月色</li>
            <li>余光中-乡愁</li>
            <li>鲁迅 阿q正传</li>
        </ul>

    </div>






</body>
</html>
