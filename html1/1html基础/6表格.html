<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>                                                                                                                               </title>
</head>
<body>


<!--
    table 标记着表格的开始和结束
    tr 标记着行的开始和结束  table row  表格行
    td 标记着单元格的开始和结束 在  table data cell 表格单元格
    表格标题caption默认情况下，表格的标题位于整个表格的第一行，一个表格只能包含一个表格标题
-->



<!--  表格完整结构  表格标题 caption
    表头 th
    表格的表头th是td单元格的一种变体，它的本质还是一种单元格
    他一般位于第一行
    表头有一种默认样式浏览器会以粗体和居中的样式显示<th>和<th/>
    标签中的内容
-->



    <table>
        <caption>考试成绩</caption>

        <tr>
            <th>姓名</th>
            <th>语文</th>
            <th>英语</th>
            <th>数学</th>
        </tr>

        <tr>
            <td>小明</td>
            <td>80</td>
            <td>80</td>
            <td>80</td>
        </tr>

        <tr>
            <td>小杰</td>
            <td>80</td>
            <td>80</td>
            <td>80</td>
        </tr>

         <tr>
            <td>小红</td>
            <td>80</td>
            <td>80</td>
            <td>80</td>
        </tr>
    </table>


<!--    表格语义化
    为了更深一层的对表格进行语义化
    html引入thead和tbody和tfoot这三个标签
 -->

    <table>
        <caption>考试成绩单</caption>
        <thead>
            <tr>
                <th>姓名</th>
                <th>语文</th>
                <th>数学</th>
                <th>英语</th>
            </tr>
        </thead>

        <tbody>
        <tr>

            <td>小明</td>
            <td>80</td>
            <td>80</td>
            <td>80</td>
        </tr>

         <tr>
            <td>小杰</td>
            <td>80</td>
            <td>80</td>
            <td>80</td>
        </tr>

         <tr>
            <td>小红</td>
            <td>80</td>
            <td>80</td>
            <td>80</td>
        </tr>

        </tbody>

        <tfoot>
            <tr>
                <td>平均</td>
                <td>90</td>

                <td>90</td>
                <td>90</td>

            </tr>
        </tfoot>
    </table>

<!--合并行

    rowspan 在设计表格时,有时候需要将两个或更多的相邻单元格组合成一个单元格;

    类似word表格 中的合并单元格 在html 中就需要用到合并行和合并类;

    合并行使用td标签的rowspan属性。而合并列则用到td标签的colspan属性.

-->
    <table>
        <tr>
            <td>姓名:</td>
            <td>小明</td>
        </tr>
        <!--第二行-->

        <tr>
            <td rowspan="2">喜欢水果:</td>
            <td>苹果</td>
            <td>草莓</td>
            <td>离职</td>
        </tr>

        <tr>
            <td>香蕉</td>
            <td>水果</td>
        </tr>

    </table>

  <hr>
<!--合并列 colspan
在html中表格合并列指的是将几个列进行合并

-->
<table>
    <tr>
        <td>绿叶学习网精品教程</td>
    </tr>

    <tr>
        <td>html教程</td>
        <td>css教程</td>
    </tr>

    <tr>
        <td>jquery教程</td>
        <td>seo教程</td>
    </tr>
</table>

</body>
</html>
