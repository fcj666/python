<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<!--    列表共有三种
        有序列表，无序列表，定义列表
        在有序列表中列表项有先后顺序之分，在无需列表中，列表项之间没有先后顺序之分。
        定义列表是一组带有特殊含义的列表，一个列表项中包含条件和说明两部分。
        有序列表项的各个列表项<li>标签内容，有序列表的列表项是有先后顺序的,一般采用数字或字母作为顺序。
        默认是采用
-->

<!--有序列表

从<ol>开始，到</ol>结束
中间的列表项是li 标签内容 有序列表项是有先后顺序的 一般采用数字或字母作为顺序，默认是采用数字顺序
ol  ordered list(有序列表)  list item(列表项)
理解标签语义更有利于记忆 而记忆HTML标签的语义是HTML基础。更多标签语义清查附录 HTML标签

<ol>和</ol> 标志着有序列表的开始和结束 而li 和</li> 标签表示这是一个列表项
在有序列表中可以包含多个列表项

-->

<ol type="i">


    <li>有序列表</li>
    <li>有序列表</li>
    <li>有序列表</li>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
    <li>jQuery</li>
    <li>Ajax</li>
    <li>SEO</li>
    <li>ASP.NET</li>


<!-- 有序列表
    type属性
    看到上面的例子,初学者会问,我们只能用数字表示列表项的顺序吗？
    默认情况下,有序列表使用数字作为列表项符号，不过我们可以有序列表type属性来改变列表项符号

    有序列表type属性取值
-->

<!--    无序列表
        无序列表简介:
            默认情况下，无序列表的项目符号是0 不过可以通过无序列表type属性来改变无序列表的列表项符号

            无序列表ul元素内部的子元素是否只允许为li元素？
            对的 ul元素的子元素只能是li，而不能是其他元素、
            对于ul内部的文本，也只能在li元素添加，而不能在li元素外部添加
    -->

</ol>



<ul type="square">
    前端最核心的三个技术
    <li>html</li>
    <li>css</li>
    <li>javascript</li>
</ul>


<!--#定义列

    definition list 定义列表
    definition term 定义名词
    而dd即definition description 定义描述
    理解标签语义更哟利于你记忆
    而记忆html标签的语义的html的基础。更多标签语义请查看附录
    html标签的语义。

    从浏览器的效果来看,dd标签会缩进文本，但是我们不要在列表之外使用dd标签来缩进文本，因为这本不是
    有效的HTML(dd标签只能在dl标签内部使用，并且他会在某些浏览器中造成难以预料的后果。


-->

<dl>

    <dt>HTML</dt>
    <dd>制作网页的标准语言，控制网页的机构</dd>
    <dt>CSS</dt>
    <dd>层别样式表，控制网页的样式</dd>
    <dt>JavaScript</dt>
    <dd>脚本语言，控制网页的行为</dd>

</dl>


</body>
</html>
