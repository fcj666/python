<!DOCTYPE html>
<html lang="en">

<head>
    <!--定义页面所使用的语言-->
    <meta http-equiv="content-type" content="text/html; charset=utf-8"/>
    <meta http-equiv="refresh" content="6;url=http://www.baidu.com"/>
    <title>Title</title>
<!--    head标签内 一般有title标签,meta标签,link标签,style标签,script标签,base标签

        title标签唯一作用就是定义网页的标题，这个标题指的是浏览器上栏的标题，而不是网页文章中的标题。
        meta标签 元信息标签 是head标签内的一个辅助性标签，meta标签内的信息不显示在网页中，一般用来使用定义页面的关键字、页面的描述
        style标签  style标签是用来定义元素的css样式，在后面的css入门章节中我们会详给大家介绍，在html入门学习中我们不需要深入探究
        script标签 script标签用于定义页面的JavaScript代码，在html和css学习中，我们不需要了解 等我们学习了JavaScript，自然就会用
        link标签  用于引用css样式文件, 对于link标签，我们学习css时才会用到,在html的学习中了解一下即可，

-->

</head>

<body>

<!--
       head标签代表的是网页的头部,而body标签代表的是网页的身体
       如果说html标签定义类整个网页的开始和技术，那么body标签的作用就是定义了网页的主题内容的开始和结束、我们学习的所有标签都是位于
       body标签内部的。

-->

    而且方便对自己的代码进行修改。

不换行，和其他行内元素挤在一行

</body>

</html>

<!--
    网页制作是1.0时代的产物，那个时候的网页主要是静态网页，所谓的静态网页就是没有与用户进行交互，且仅仅供读者浏览的网页，例如
    一篇qq日志，一片博文等展示型网页，在1.0网页 用户能做的额唯一几件事就是浏览这个网站的文字图片内容，不能像现在一样
    评论交流，缺乏交互性
    现在大多数都听过Dreamwearer+ fireworks + flash这个组合就是web1.0时代的产物

    web2.0
    前段开发时从网页制作演变而来的，
    从2005年开始，互联网进入web2.0 时代，由单一的文字和图片组成的，
    静态网页已经不能满足用户的需求，用户需要更好的体验，在web2.0时代
    网页有静态网页和动态网页。所谓动态网页，就是用户不仅仅可以浏览网页,还可以与服务器进行交互，
    举个例子 你登录新浪微博，要输入账号密码:这个时候就需要服务器对你的账号和密码进行验证通过才行。

    web2.0 时代的网页不仅包含绚丽的动画，音频，和视频，还可以让用户在网页中评论交流
    上传和下载文件等。这个时代的哇网页，如果是用网页三剑客制作的，那远远不能满足需求，现在网站开发无论是开发难度
    还是开发方式都更接近传统的网站后台开发，所以现在不再叫网页制作，而是叫做web前段开发


    1.1.2 前端技术
    我们知道，用所谓的网页三剑客已经不能满足需求了，那前端开发究竟是学习什么技术呢？
    网页主要由三部分组成，结构，表现和行为

    目前的模式是 html css 和js

    html是什么?
        全称是 超文本标记语言, 简单来说网页就是用html语言制作的，html是一门描述性语言，是一门非常容易入门的语言
    css
        层叠样式表 以后我们在别的地方看到层叠样式表或css样式 指的就是css
    JavaScript
        是一门脚本语言

    前段开发除了学习掌握这三中，还要学习html5，css3，ajax，seo
    ajax  asynchronous Javascript And XML (异步的JavaScript和XML) 是一种差创建交互式网页应用的网页开发技术

    通过在后台与后台服务器进行少量数据交换，ajax可以使网页实现异步更新，这意味着可以重新加载整个网页的情况下。对网页的某部分
    进行更新。传统的网页不适用ajax 如果需要更新内容，必须重载整个页面
    ajax是前后端交互的技术，主要是在前端实现


    seo search engine optimization 搜索引擎优化 seo优化是专门利用搜索引擎 的规则来提高目前网站在有关搜素引擎内的自然排名的方式，

    简单来说，你建好了网站并不代表你网站能被搜索引擎搜到，我们一般使用百度搜索资料时，搜索出来的网页有很多，但是我们一般看了
    搜索结果的第一二页就不往下看了，。seo是专门为了我们的王站能排在搜索结果的前面你，这样你的网站就会有流量，你做的网站
    相信你也是想让你的网站有更多人浏览吧。

    HTML 要学习什么呢,用一句话表示容易懂的就是，学习html各种标签就是学习网页的骨架

    标签有文字标签，图像标签，音频标签，表单标签等等。

    标签的叫法更形象的说明了html元素是用来标记的，来标记这是一段文字还是一张图片,从而让浏览器将你的代码解析出来而展示给用户看。
