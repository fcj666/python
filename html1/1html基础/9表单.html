<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>表单form标签</title>
</head>
<body>
<!--
    表单最重要的作用就是在客户端手机用户
然后 将数据递交给服务器来处理。
    如果要创建一个表单 我们就要把各种表单放在<form></form>标签内部
    记住我们常说的表单，指的是文本框，按钮,下拉列表等统称

-->
    <form>
        <input type="text" value="这是一个文本框"/> <br/>
        <textarea></textarea><br/>
        <select>
            <option>html</option>
            <option>CSS</option>
            <option>JS</option>
        </select>
    </form>



<!--
    form标签属性
    name action
    method enctype和target属性
-->
</body>
</html>
