<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>img常用属性</title>

<!--    属性   说明-->
<!--    src    图像的文件地址-->
<!--    alt    图片显示不出来时的提示文字-->
<!--    title  鼠标移动到图片上的提示文字-->
</head>

<script>
    // img标签是一个自闭合标签 没有结束标签 src 属性用于图像文件的所在位置
    //alt属性  用于设置图片的描述信息，这些信息是给搜索引擎看的，在搜索引擎优化 alt属性也是一个非常重要的属性
    // title 属性用于设置鼠标移动到图片上的提示文字,这些提示文字是给用户看到

</script>


<body>
    <img src="lufei.jpg" alt="路飞" title="海贼王">



</body>
</html>
